name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (lint + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install
        working-directory: backend
        run: npm ci

      # Catch parse errors before they reach a running container.
      # `node --check` validates each file's syntax without executing it.
      - name: Syntax check
        working-directory: backend
        run: |
          set -e
          find . -path ./node_modules -prune -o -name '*.js' -print -o -name '*.mjs' -print \
            | xargs -I{} node --check {}

      - name: Test
        working-directory: backend
        run: npm test

  frontend:
    name: Frontend (build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        run: npm run build
