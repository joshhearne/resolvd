name: Notify website on release

# Fires the marketing site's deploy hook (Vercel / Netlify / Cloudflare
# Pages / etc.) so the Astro static build picks up the new GitHub
# Release and refreshes the public changelog.
#
# Wiring:
#   1. On the deploy host, create a "deploy hook" webhook URL.
#   2. In this repo: Settings → Secrets → Actions → New repository
#      secret named RESOLVD_DEPLOY_HOOK_URL holding that URL.
#   3. Cut a release (push a v*.*.* tag). release.yml creates the
#      GitHub Release; the release:published event runs this workflow,
#      which POSTs to the hook and triggers a site rebuild.
#
# When the secret is missing the workflow logs and exits cleanly so a
# half-configured repo doesn't fail every release.

on:
  release:
    types: [published]

jobs:
  ping-deploy-hook:
    runs-on: ubuntu-latest
    steps:
      - name: POST deploy hook
        env:
          HOOK_URL: ${{ secrets.RESOLVD_DEPLOY_HOOK_URL }}
          TAG: ${{ github.event.release.tag_name }}
        run: |
          if [ -z "$HOOK_URL" ]; then
            echo "::warning::RESOLVD_DEPLOY_HOOK_URL secret not set — skipping site rebuild for ${TAG}"
            exit 0
          fi
          # Most hosts (Vercel, Netlify, Cloudflare Pages) accept an
          # empty POST body and trigger a fresh build. We pass the tag
          # in the body too in case the host wants to log it.
          curl -fsSL -X POST "$HOOK_URL" \
            -H 'Content-Type: application/json' \
            -d "{\"trigger\":\"resolvd-release\",\"tag\":\"${TAG}\"}"
          echo "Deploy hook fired for ${TAG}"
