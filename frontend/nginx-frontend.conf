server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # React router — serve index.html for all non-asset routes.
    # Note: $uri/ deliberately omitted — when a frontend public/ subdir
    # exists with no index.html (e.g. /help/ holds screenshot PNGs),
    # nginx would 403 the directory listing instead of falling through
    # to /index.html for SPA routing. Static files still hit via $uri.
    location / {
        try_files $uri /index.html;
    }
}
