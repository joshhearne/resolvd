server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Hashed Vite assets are immutable — long-cache them so mobile
    # browsers + Cloudflare can stash them indefinitely.
    location ^~ /assets/ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # index.html + sw.js must always revalidate. Without this, mobile
    # Safari / installed PWAs keep serving the old HTML (which still
    # points at last-deploy's hashed JS), so frontend changes appear
    # to "not land" on mobile until a manual cache wipe. `expires off`
    # suppresses nginx's auto Cache-Control header so our add_header
    # wins; `always` makes it apply on 304s too (so a revalidate that
    # comes back unchanged still re-asserts no-cache).
    location = /index.html {
        expires off;
        etag off;
        if_modified_since off;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
    }
    location = /sw.js {
        expires off;
        etag off;
        if_modified_since off;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    }

    # React router — serve index.html for all non-asset routes.
    # Note: $uri/ deliberately omitted — when a frontend public/ subdir
    # exists with no index.html (e.g. /help/ holds screenshot PNGs),
    # nginx would 403 the directory listing instead of falling through
    # to /index.html for SPA routing. Static files still hit via $uri.
    location / {
        try_files $uri /index.html;
    }
}
