# issues.gomotx.com — public HTTPS via Cloudflare Origin Cert
# Host nginx terminates SSL, proxies to Docker stack on 8090
#
# Install: sudo cp /opt/issues/nginx/host-proxy.conf /etc/nginx/sites-available/issues.gomotx.com
#          sudo ln -s /etc/nginx/sites-available/issues.gomotx.com /etc/nginx/sites-enabled/
#          sudo nginx -t && sudo systemctl reload nginx

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name issues.gomotx.com;
    return 301 https://$host$request_uri;
}

# HTTPS — terminate SSL, proxy to Docker nginx on 8090
server {
    listen 443 ssl;
    server_name issues.gomotx.com;

    ssl_certificate     /opt/issues/nginx/certs/fullchain.pem;
    ssl_certificate_key /opt/issues/nginx/certs/privkey.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    add_header Strict-Transport-Security "max-age=63072000" always;

    client_max_body_size 55M;

    location / {
        proxy_pass          http://127.0.0.1:8090;
        proxy_http_version  1.1;
        proxy_set_header    Host              $host;
        proxy_set_header    X-Real-IP         $http_cf_connecting_ip;
        proxy_set_header    X-Forwarded-For   $http_cf_connecting_ip;
        proxy_set_header    X-Forwarded-Proto https;
        proxy_set_header    Cookie            $http_cookie;
        proxy_pass_header   Set-Cookie;
        proxy_read_timeout  60s;
    }
}
