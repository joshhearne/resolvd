# Resolvd — host nginx terminates TLS, proxies to Docker stack on 127.0.0.1:8090
#
# Tailored for Cloudflare Origin Certificates (real client IP comes via CF-Connecting-IP).
# For non-Cloudflare deployments, swap $http_cf_connecting_ip → $remote_addr below
# and use a normal Let's Encrypt cert instead of an Origin Cert.
#
# Install:
#   sudo cp host-proxy.conf /etc/nginx/sites-available/resolvd
#   # Edit: replace yourdomain.com and the ssl_certificate paths below.
#   sudo ln -s /etc/nginx/sites-available/resolvd /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# Cloudflare dashboard: SSL/TLS → Origin Server → Create Certificate.
# Save the cert + key somewhere root-readable (e.g. /etc/ssl/cloudflare/).
# Set Cloudflare SSL/TLS mode to Full (strict).

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name yourdomain.com;
    return 301 https://$host$request_uri;
}

# HTTPS — terminate TLS, proxy to Docker nginx on 8090
server {
    listen 443 ssl;
    server_name yourdomain.com;

    ssl_certificate     /etc/ssl/cloudflare/yourdomain.com.pem;
    ssl_certificate_key /etc/ssl/cloudflare/yourdomain.com.key;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    add_header Strict-Transport-Security "max-age=63072000" always;

    # Match or exceed MAX_UPLOAD_MB in your .env (default 50).
    client_max_body_size 55M;

    location / {
        proxy_pass          http://127.0.0.1:8090;
        proxy_http_version  1.1;
        proxy_set_header    Host              $host;
        proxy_set_header    X-Real-IP         $http_cf_connecting_ip;
        proxy_set_header    X-Forwarded-For   $http_cf_connecting_ip;
        proxy_set_header    X-Forwarded-Proto https;
        proxy_set_header    Cookie            $http_cookie;
        proxy_pass_header   Set-Cookie;
        proxy_read_timeout  60s;
    }
}
