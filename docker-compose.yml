services:
  postgres:
    image: postgres:16-alpine
    container_name: resolvd-postgres
    restart: unless-stopped
    env_file: .env
    environment:
      - POSTGRES_DB=resolvd
      - POSTGRES_USER=resolvd
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - pg-data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U resolvd"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    container_name: resolvd-backend
    restart: unless-stopped
    env_file: .env
    environment:
      - NODE_ENV=production
      - PORT=3001
      - DATABASE_URL=postgresql://resolvd:${POSTGRES_PASSWORD}@postgres:5432/resolvd
      - UPLOADS_DIR=/data/uploads
    volumes:
      - uploads-data:/data/uploads
    networks:
      - internal
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: resolvd-frontend
    restart: unless-stopped
    networks:
      - internal

  nginx:
    image: nginx:alpine
    container_name: resolvd-nginx
    restart: unless-stopped
    ports:
      - "127.0.0.1:8090:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    networks:
      - internal
    depends_on:
      - backend
      - frontend

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: resolvd-cloudflared
    restart: unless-stopped
    env_file: .env
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    networks:
      - internal
    depends_on:
      - nginx

volumes:
  pg-data:
  uploads-data:

networks:
  internal:
    driver: bridge
