services:
  postgres:
    image: postgres:16-alpine
    container_name: mot-issues-postgres
    restart: unless-stopped
    env_file: .env
    environment:
      - POSTGRES_DB=mot_issues
      - POSTGRES_USER=mot_issues
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - pg-data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mot_issues"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    container_name: mot-issues-backend
    restart: unless-stopped
    env_file: .env
    environment:
      - NODE_ENV=production
      - PORT=3001
      - DATABASE_URL=postgresql://mot_issues:${POSTGRES_PASSWORD}@postgres:5432/mot_issues
      - UPLOADS_DIR=/data/uploads
    volumes:
      - uploads-data:/data/uploads
    networks:
      - internal
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: mot-issues-frontend
    restart: unless-stopped
    networks:
      - internal

  nginx:
    image: nginx:alpine
    container_name: mot-issues-nginx
    restart: unless-stopped
    ports:
      - "127.0.0.1:8090:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    networks:
      - internal
    depends_on:
      - backend
      - frontend

volumes:
  pg-data:
  uploads-data:

networks:
  internal:
    driver: bridge
